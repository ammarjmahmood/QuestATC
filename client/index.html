<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ATC Sim — Radio Trainer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; color: #00ff88; font-family: 'Courier New', monospace; overflow: hidden; }
    canvas { display: block; }

    #hud {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; z-index: 10;
    }

    /* Radio panel overlay */
    #radio-panel {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(10, 15, 10, 0.92); border: 1px solid #1a3a1a;
      border-radius: 12px; padding: 16px 24px; z-index: 20;
      min-width: 380px; max-width: 520px; pointer-events: auto;
      box-shadow: 0 0 30px rgba(0, 255, 80, 0.08);
    }

    #radio-panel .freq {
      font-size: 11px; color: #447744; text-align: center;
      margin-bottom: 8px; letter-spacing: 2px;
    }

    #transcript {
      max-height: 200px; overflow-y: auto; margin-bottom: 12px;
      font-size: 13px; line-height: 1.5;
      scrollbar-width: thin; scrollbar-color: #1a3a1a transparent;
    }
    #transcript .atc { color: #00ff88; }
    #transcript .pilot { color: #88bbff; }
    #transcript .system { color: #666; font-style: italic; }
    #transcript p { margin-bottom: 6px; }

    #ptt-btn {
      display: block; width: 100%; padding: 14px;
      background: #1a1a2a; border: 2px solid #334;
      color: #88bbff; font-family: inherit; font-size: 14px;
      border-radius: 8px; cursor: pointer; text-align: center;
      transition: all 0.15s; letter-spacing: 1px;
      user-select: none; -webkit-user-select: none;
    }
    #ptt-btn:active, #ptt-btn.active {
      background: #2a1a1a; border-color: #ff4444;
      color: #ff6666; box-shadow: 0 0 20px rgba(255,50,50,0.3);
    }
    #ptt-btn.active::after { content: ' — TRANSMITTING'; }

    #status-line {
      font-size: 10px; color: #444; text-align: center;
      margin-top: 8px; letter-spacing: 1px;
    }

    /* VR enter button */
    #vr-btn {
      position: fixed; top: 20px; right: 20px; z-index: 20;
      background: rgba(0,0,0,0.7); border: 1px solid #00ff88;
      color: #00ff88; padding: 10px 20px; border-radius: 8px;
      font-family: inherit; font-size: 13px; cursor: pointer;
    }
    #vr-btn:hover { background: #00ff88; color: #000; }
    #vr-btn:disabled { opacity: 0.3; cursor: default; }

    /* New session btn */
    #reset-btn {
      position: fixed; top: 20px; left: 20px; z-index: 20;
      background: rgba(0,0,0,0.7); border: 1px solid #553;
      color: #aa8; padding: 8px 16px; border-radius: 8px;
      font-family: inherit; font-size: 11px; cursor: pointer;
    }

    /* Debrief button */
    #debrief-btn {
      position: fixed; top: 56px; left: 20px; z-index: 20;
      background: rgba(0,0,0,0.7); border: 1px solid #358;
      color: #6af; padding: 8px 16px; border-radius: 8px;
      font-family: inherit; font-size: 11px; cursor: pointer;
    }
    #debrief-btn:hover { background: #6af; color: #000; }

    /* Debrief overlay */
    #debrief-overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.92); overflow-y: auto;
      padding: 40px; font-size: 14px; line-height: 1.7;
    }
    #debrief-overlay.visible { display: block; }
    #debrief-overlay h2 { color: #00ff88; margin-top: 20px; }
    #debrief-overlay strong { color: #6af; }
    #debrief-overlay .grade { font-size: 48px; color: #00ff88; text-align: center; margin: 20px 0; }
    #debrief-close, #history-close {
      position: fixed; top: 20px; right: 20px; z-index: 101;
      background: #333; border: 1px solid #666; color: #fff;
      padding: 8px 20px; border-radius: 8px; font-family: inherit;
      font-size: 13px; cursor: pointer;
    }

    /* History button */
    #history-btn {
      position: fixed; top: 92px; left: 20px; z-index: 20;
      background: rgba(0,0,0,0.7); border: 1px solid #535;
      color: #a6f; padding: 8px 16px; border-radius: 8px;
      font-family: inherit; font-size: 11px; cursor: pointer;
    }
    #history-btn:hover { background: #a6f; color: #000; }

    /* History overlay */
    #history-overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.95); overflow-y: auto;
      padding: 40px; font-size: 14px; line-height: 1.7;
    }
    #history-overlay.visible { display: block; }
    #history-overlay h2 { color: #a6f; margin-bottom: 16px; }
    #history-overlay table { width: 100%; border-collapse: collapse; }
    #history-overlay th { text-align: left; color: #666; padding: 8px; border-bottom: 1px solid #333; font-size: 11px; letter-spacing: 1px; }
    #history-overlay td { padding: 10px 8px; border-bottom: 1px solid #1a1a1a; }
    #history-overlay tr:hover td { background: rgba(100,50,255,0.05); }
    .grade-badge { font-weight: bold; font-size: 18px; }
    .grade-A { color: #00ff88; } .grade-B { color: #6af; } .grade-C { color: #fa0; }
    .grade-D { color: #f66; } .grade-F { color: #f33; }
    .history-view-btn {
      background: #222; border: 1px solid #444; color: #aaa; padding: 4px 12px;
      border-radius: 4px; font-family: inherit; font-size: 11px; cursor: pointer;
    }
    .history-view-btn:hover { color: #fff; border-color: #888; }

    /* Session detail view inside history */
    #session-detail { margin-top: 20px; }
    #session-detail .msg-pilot { color: #88bbff; margin: 6px 0; }
    #session-detail .msg-atc { color: #00ff88; margin: 6px 0; }
    #session-detail .msg-debrief { color: #ccc; margin-top: 20px; padding: 16px; background: #111; border-radius: 8px; white-space: pre-wrap; }
  </style>
</head>
<body>

<canvas id="scene"></canvas>

<div id="radio-panel">
  <div class="freq">COM1 &nbsp; 124.900 &nbsp; | &nbsp; ATIS 127.875</div>
  <div id="transcript">
    <p class="system">[ Radio check — press and hold PTT to transmit ]</p>
  </div>
  <button id="ptt-btn">[ PUSH TO TALK ]</button>
  <div id="status-line">Quest: use right trigger for PTT</div>
</div>

<button id="vr-btn" disabled>ENTER VR</button>
<button id="reset-btn">NEW SESSION</button>
<button id="debrief-btn">REQUEST DEBRIEF</button>
<button id="history-btn">PAST SESSIONS</button>

<div id="debrief-overlay">
  <button id="debrief-close">CLOSE</button>
  <div id="debrief-content"></div>
</div>

<div id="history-overlay">
  <button id="history-close">CLOSE</button>
  <h2>SESSION HISTORY</h2>
  <div id="history-list"></div>
  <div id="session-detail"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { VRButton } from 'three/addons/webxr/VRButton.js';
import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';
import { SparkRenderer, SplatMesh } from 'https://sparkjs.dev/releases/spark/2.0.0/spark.module.js';

// ── Scene setup ──
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb); // sky blue
scene.fog = new THREE.Fog(0x87ceeb, 500, 5000);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
camera.position.set(0, 2.5, 0); // seated cockpit height

// ── Spark Gaussian Splat Renderer ──
const spark = new SparkRenderer({ renderer });
scene.add(spark);

// Try to load cockpit splat — falls back to placeholder geometry if missing
let hasSplatCockpit = false;
async function loadCockpitSplat() {
  try {
    // Check if splat file exists
    const check = await fetch('/assets/cockpit.spz', { method: 'HEAD' });
    if (!check.ok) {
      console.log('No cockpit.spz found — using placeholder geometry');
      return;
    }
    const splat = new SplatMesh({ url: '/assets/cockpit.spz' });
    // Position the splat so the pilot seat is at camera origin
    splat.position.set(0, 1.8, 0);
    scene.add(splat);
    hasSplatCockpit = true;
    console.log('Gaussian splat cockpit loaded');
  } catch (e) {
    console.log('Splat load failed, using placeholder:', e.message);
  }
}
loadCockpitSplat();

// ── Lighting ──
const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xffffff, 1.2);
sun.position.set(100, 80, 50);
sun.castShadow = true;
scene.add(sun);

// ── Ground / Runway ──
// Grass
const groundGeo = new THREE.PlaneGeometry(5000, 5000);
const groundMat = new THREE.MeshLambertMaterial({ color: 0x3a7a3a });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
scene.add(ground);

// Runway
const runwayGeo = new THREE.PlaneGeometry(45, 2500);
const runwayMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
const runway = new THREE.Mesh(runwayGeo, runwayMat);
runway.rotation.x = -Math.PI / 2;
runway.position.set(0, 0.01, -800);
scene.add(runway);

// Runway markings (center line dashes)
for (let z = -1800; z < 200; z += 40) {
  const dash = new THREE.Mesh(
    new THREE.PlaneGeometry(0.5, 15),
    new THREE.MeshBasicMaterial({ color: 0xffffff })
  );
  dash.rotation.x = -Math.PI / 2;
  dash.position.set(0, 0.02, z);
  scene.add(dash);
}

// Runway numbers "22"
const makeRunwayNumber = (text, z, rot) => {
  const c = document.createElement('canvas');
  c.width = 256; c.height = 256;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 180px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 128, 128);
  const tex = new THREE.CanvasTexture(c);
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(20, 20),
    new THREE.MeshBasicMaterial({ map: tex, transparent: true })
  );
  m.rotation.x = -Math.PI / 2;
  m.rotation.z = rot;
  m.position.set(0, 0.03, z);
  scene.add(m);
};
makeRunwayNumber('22', 150, 0);
makeRunwayNumber('04', -1750, Math.PI);

// Taxiway
const taxiGeo = new THREE.PlaneGeometry(20, 600);
const taxiMat = new THREE.MeshLambertMaterial({ color: 0x444444 });
const taxiway = new THREE.Mesh(taxiGeo, taxiMat);
taxiway.rotation.x = -Math.PI / 2;
taxiway.position.set(60, 0.01, -200);
scene.add(taxiway);

// Taxiway connector
const connGeo = new THREE.PlaneGeometry(80, 20);
const conn = new THREE.Mesh(connGeo, taxiMat.clone());
conn.rotation.x = -Math.PI / 2;
conn.position.set(30, 0.01, 100);
scene.add(conn);

// ── Simple cockpit frame (placeholder until gaussian splat replaces it) ──
const cockpitGroup = new THREE.Group();
cockpitGroup.position.set(0, 1.8, 0);
// Hide placeholder once splat loads
loadCockpitSplat().then(() => {
  if (hasSplatCockpit) cockpitGroup.visible = false;
});

// Dashboard
const dashGeo = new THREE.BoxGeometry(3, 0.8, 0.3);
const dashMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
const dashboard = new THREE.Mesh(dashGeo, dashMat);
dashboard.position.set(0, -0.3, -1.2);
cockpitGroup.add(dashboard);

// Yoke column
const yokeGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.5, 8);
const yokeMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
const yoke = new THREE.Mesh(yokeGeo, yokeMat);
yoke.position.set(0, -0.35, -0.9);
yoke.rotation.x = -0.4;
cockpitGroup.add(yoke);

// Yoke wheel
const yokeWheelGeo = new THREE.TorusGeometry(0.15, 0.02, 8, 24);
const yokeWheel = new THREE.Mesh(yokeWheelGeo, yokeMat);
yokeWheel.position.set(0, -0.15, -0.75);
cockpitGroup.add(yokeWheel);

// Instrument panel - six pack gauges (simple circles)
const gaugePositions = [
  [-0.4, 0.0, -1.05], [0, 0.0, -1.05], [0.4, 0.0, -1.05],
  [-0.4, -0.25, -1.05], [0, -0.25, -1.05], [0.4, -0.25, -1.05],
];

gaugePositions.forEach(([x, y, z]) => {
  // Gauge bezel
  const bezel = new THREE.Mesh(
    new THREE.RingGeometry(0.1, 0.12, 32),
    new THREE.MeshBasicMaterial({ color: 0x666666 })
  );
  bezel.position.set(x, y, z);
  cockpitGroup.add(bezel);

  // Gauge face
  const face = new THREE.Mesh(
    new THREE.CircleGeometry(0.1, 32),
    new THREE.MeshBasicMaterial({ color: 0x0a0a0a })
  );
  face.position.set(x, y, z + 0.001);
  cockpitGroup.add(face);

  // Gauge needle
  const needle = new THREE.Mesh(
    new THREE.PlaneGeometry(0.005, 0.08),
    new THREE.MeshBasicMaterial({ color: 0xffffff })
  );
  needle.position.set(x, y + 0.01, z + 0.002);
  needle.rotation.z = Math.random() * 1.5 - 0.75; // random position
  cockpitGroup.add(needle);
});

// Radio stack area (where our virtual radio sits)
const radioStack = new THREE.Mesh(
  new THREE.BoxGeometry(0.6, 0.4, 0.15),
  new THREE.MeshLambertMaterial({ color: 0x1a1a1a })
);
radioStack.position.set(0.8, -0.2, -1.0);
cockpitGroup.add(radioStack);

// Radio display (green text)
const radioCanvas = document.createElement('canvas');
radioCanvas.width = 256; radioCanvas.height = 128;
const rctx = radioCanvas.getContext('2d');
rctx.fillStyle = '#0a0f0a';
rctx.fillRect(0, 0, 256, 128);
rctx.fillStyle = '#00ff88';
rctx.font = '24px Courier New';
rctx.fillText('COM1 124.900', 10, 35);
rctx.fillText('NAV1 110.10', 10, 70);
rctx.font = '16px Courier New';
rctx.fillStyle = '#446644';
rctx.fillText('ATIS 127.875', 10, 105);

const radioTex = new THREE.CanvasTexture(radioCanvas);
const radioDisplay = new THREE.Mesh(
  new THREE.PlaneGeometry(0.5, 0.25),
  new THREE.MeshBasicMaterial({ map: radioTex })
);
radioDisplay.position.set(0.8, -0.1, -0.92);
cockpitGroup.add(radioDisplay);

// Windshield frame (posts)
const postMat = new THREE.MeshLambertMaterial({ color: 0x2a2a2a });
[-0.9, 0, 0.9].forEach(x => {
  const post = new THREE.Mesh(new THREE.BoxGeometry(0.04, 1.0, 0.04), postMat);
  post.position.set(x, 0.3, -1.3);
  cockpitGroup.add(post);
});
// Top bar
const topBar = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.04, 0.04), postMat);
topBar.position.set(0, 0.8, -1.3);
cockpitGroup.add(topBar);

// Overhead panel hint
const overhead = new THREE.Mesh(
  new THREE.BoxGeometry(1.8, 0.1, 0.6),
  new THREE.MeshLambertMaterial({ color: 0x1a1a1a })
);
overhead.position.set(0, 1.0, -0.9);
cockpitGroup.add(overhead);

scene.add(cockpitGroup);

// ── Control tower in the distance ──
const towerBase = new THREE.Mesh(
  new THREE.CylinderGeometry(3, 4, 30, 8),
  new THREE.MeshLambertMaterial({ color: 0xcccccc })
);
towerBase.position.set(-200, 15, -300);
scene.add(towerBase);

const towerCab = new THREE.Mesh(
  new THREE.CylinderGeometry(6, 5, 5, 8),
  new THREE.MeshLambertMaterial({ color: 0x336666 })
);
towerCab.position.set(-200, 32, -300);
scene.add(towerCab);

// ── Parked aircraft ──
const makeSimplePlane = (x, z, rot) => {
  const g = new THREE.Group();
  // fuselage
  g.add(new THREE.Mesh(
    new THREE.CylinderGeometry(0.6, 0.6, 8, 8),
    new THREE.MeshLambertMaterial({ color: 0xeeeeee })
  ));
  // wing
  const wing = new THREE.Mesh(
    new THREE.BoxGeometry(12, 0.1, 1.5),
    new THREE.MeshLambertMaterial({ color: 0xdddddd })
  );
  wing.position.y = 0;
  g.add(wing);
  g.position.set(x, 1.5, z);
  g.rotation.y = rot;
  g.children[0].rotation.z = Math.PI / 2;
  scene.add(g);
};
makeSimplePlane(60, -50, 0.3);
makeSimplePlane(60, -120, -0.1);
makeSimplePlane(-40, -500, Math.PI);

// ── WebXR Controllers ──
const controllerModelFactory = new XRControllerModelFactory();

const controller0 = renderer.xr.getController(0);
scene.add(controller0);
const controller1 = renderer.xr.getController(1);
scene.add(controller1);

const grip0 = renderer.xr.getControllerGrip(0);
grip0.add(controllerModelFactory.createControllerModel(grip0));
scene.add(grip0);
const grip1 = renderer.xr.getControllerGrip(1);
grip1.add(controllerModelFactory.createControllerModel(grip1));
scene.add(grip1);

// ── VR Button ──
const vrBtnEl = document.getElementById('vr-btn');
if ('xr' in navigator) {
  navigator.xr.isSessionSupported('immersive-vr').then(supported => {
    if (supported) {
      vrBtnEl.disabled = false;
      vrBtnEl.textContent = 'ENTER VR';
      vrBtnEl.addEventListener('click', async () => {
        const session = await navigator.xr.requestSession('immersive-vr', {
          optionalFeatures: ['local-floor', 'hand-tracking']
        });
        renderer.xr.setSession(session);
        vrBtnEl.textContent = 'IN VR';
      });
    } else {
      vrBtnEl.textContent = 'VR N/A';
    }
  });
} else {
  vrBtnEl.textContent = 'NO WebXR';
}

// ── Radio panel in VR (world-space UI) ──
let vrRadioPanel = null;

function createVRRadioPanel() {
  const panelCanvas = document.createElement('canvas');
  panelCanvas.width = 512; panelCanvas.height = 256;
  const panelTex = new THREE.CanvasTexture(panelCanvas);
  panelTex.needsUpdate = true;

  const panel = new THREE.Mesh(
    new THREE.PlaneGeometry(0.6, 0.3),
    new THREE.MeshBasicMaterial({ map: panelTex, transparent: true })
  );
  panel.position.set(-0.4, 1.6, -0.8);
  panel.rotation.x = -0.2;
  cockpitGroup.add(panel);

  return { mesh: panel, canvas: panelCanvas, texture: panelTex };
}

function updateVRPanel(messages) {
  if (!vrRadioPanel) return;
  const { canvas, texture } = vrRadioPanel;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(5, 10, 5, 0.95)';
  ctx.fillRect(0, 0, 512, 256);
  ctx.font = '14px Courier New';

  const recent = messages.slice(-6);
  recent.forEach((m, i) => {
    ctx.fillStyle = m.type === 'atc' ? '#00ff88' : m.type === 'pilot' ? '#88bbff' : '#555';
    const y = 25 + i * 35;
    const label = m.type === 'atc' ? 'TWR: ' : m.type === 'pilot' ? 'YOU: ' : '    ';
    const text = label + m.text;
    // Word wrap
    const words = text.split(' ');
    let line = '';
    let lineY = y;
    words.forEach(w => {
      if (ctx.measureText(line + w).width > 490) {
        ctx.fillText(line, 10, lineY);
        line = w + ' ';
        lineY += 16;
      } else {
        line += w + ' ';
      }
    });
    ctx.fillText(line, 10, lineY);
  });

  texture.needsUpdate = true;
}

// ── Audio / Speech ──
const transcript = document.getElementById('transcript');
const pttBtn = document.getElementById('ptt-btn');
const statusLine = document.getElementById('status-line');
let isTransmitting = false;
let recognition = null;
let radioMessages = []; // {type: 'atc'|'pilot'|'system', text: string}

// Radio static audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playRadioClick() {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.value = 800;
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.08);
}

function playRadioStatic(duration = 0.3) {
  const bufferSize = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * 0.04;
  }
  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 2000;
  filter.Q.value = 0.5;
  source.connect(filter).connect(audioCtx.destination);
  source.start();
}

function addMessage(type, text) {
  radioMessages.push({ type, text });
  const p = document.createElement('p');
  p.className = type;
  p.textContent = (type === 'atc' ? 'TWR: ' : type === 'pilot' ? 'YOU: ' : '') + text;
  transcript.appendChild(p);
  transcript.scrollTop = transcript.scrollHeight;
  updateVRPanel(radioMessages);
}

// Speech recognition setup
function setupSpeechRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    statusLine.textContent = 'Speech recognition not supported';
    return;
  }

  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  let finalTranscript = '';

  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        finalTranscript += e.results[i][0].transcript;
      } else {
        interim += e.results[i][0].transcript;
      }
    }
    if (interim) {
      statusLine.textContent = `Hearing: ${interim}`;
    }
  };

  recognition.onerror = (e) => {
    console.warn('Speech error:', e.error);
    if (e.error !== 'no-speech') {
      statusLine.textContent = `Mic error: ${e.error}`;
    }
  };

  recognition.onend = () => {
    if (isTransmitting) {
      // Restart if still holding PTT
      try { recognition.start(); } catch(e) {}
    } else if (finalTranscript.trim()) {
      // PTT released — send the message
      const msg = finalTranscript.trim();
      finalTranscript = '';
      sendToATC(msg);
    }
  };

  return { getFinalAndReset: () => { const t = finalTranscript.trim(); finalTranscript = ''; return t; } };
}

const speechCtrl = setupSpeechRecognition();

// PTT control
function startPTT() {
  if (isTransmitting) return;
  isTransmitting = true;
  pttBtn.classList.add('active');
  playRadioClick();
  audioCtx.resume();

  statusLine.textContent = 'TRANSMITTING — speak now';
  if (recognition) {
    try { recognition.start(); } catch(e) {}
  }
}

function stopPTT() {
  if (!isTransmitting) return;
  isTransmitting = false;
  pttBtn.classList.remove('active');
  playRadioClick();

  statusLine.textContent = 'Processing...';
  if (recognition) {
    recognition.stop(); // onend will fire and send message
  }
}

// Desktop PTT (hold button or spacebar)
pttBtn.addEventListener('mousedown', startPTT);
pttBtn.addEventListener('mouseup', stopPTT);
pttBtn.addEventListener('mouseleave', () => { if (isTransmitting) stopPTT(); });
pttBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startPTT(); });
pttBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopPTT(); });

// ── ATC Communication ──
async function sendToATC(pilotMessage) {
  if (!pilotMessage) {
    statusLine.textContent = 'No speech detected — try again';
    return;
  }

  addMessage('pilot', pilotMessage);
  statusLine.textContent = 'Waiting for tower...';

  try {
    const res = await fetch('/api/atc', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: pilotMessage }),
    });
    const data = await res.json();

    if (data.reply) {
      playRadioStatic(0.2);
      addMessage('atc', data.reply);
      statusLine.textContent = 'Tower responded — hold PTT to reply';
      // Try TTS
      speakATC(data.reply);
    }
  } catch (err) {
    addMessage('system', 'Radio communication error');
    statusLine.textContent = 'Communication lost — try again';
  }
}

async function speakATC(text) {
  try {
    const res = await fetch('/api/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });

    if (!res.ok) {
      // TTS unavailable — that's ok, text still shows
      return;
    }

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);

    // Apply radio filter effect
    const source = audioCtx.createMediaElementSource(audio);
    const bandpass = audioCtx.createBiquadFilter();
    bandpass.type = 'bandpass';
    bandpass.frequency.value = 2500;
    bandpass.Q.value = 0.7;

    const distortion = audioCtx.createWaveShaper();
    const curve = new Float32Array(256);
    for (let i = 0; i < 256; i++) {
      const x = (i * 2) / 256 - 1;
      curve[i] = Math.tanh(x * 1.5);
    }
    distortion.curve = curve;

    source.connect(bandpass).connect(distortion).connect(audioCtx.destination);
    audio.play();
  } catch (e) {
    // Silent fail — text display is primary
  }
}

// ── Debrief ──
const debriefOverlay = document.getElementById('debrief-overlay');
const debriefContent = document.getElementById('debrief-content');

document.getElementById('debrief-btn').addEventListener('click', async () => {
  statusLine.textContent = 'Generating debrief...';
  try {
    const res = await fetch('/api/debrief', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({}),
    });
    const data = await res.json();
    if (data.reply) {
      // Simple markdown-ish rendering
      let html = data.reply
        .replace(/\*\*GRADE:\s*([A-F][+-]?)\*\*/g, '<div class="grade">$1</div>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/^(\d+)\. (.+)$/gm, '<li><strong>$1.</strong> $2</li>')
        .replace(/→/g, '→')
        .replace(/\n\n/g, '<br><br>')
        .replace(/\n/g, '<br>');
      debriefContent.innerHTML = html;
      debriefOverlay.classList.add('visible');
      statusLine.textContent = 'Debrief ready';
    }
  } catch (err) {
    statusLine.textContent = 'Debrief failed — try again';
  }
});

document.getElementById('debrief-close').addEventListener('click', () => {
  debriefOverlay.classList.remove('visible');
});

// ── History ──
const historyOverlay = document.getElementById('history-overlay');
const historyList = document.getElementById('history-list');
const sessionDetail = document.getElementById('session-detail');

document.getElementById('history-btn').addEventListener('click', async () => {
  sessionDetail.innerHTML = '';
  historyList.innerHTML = 'Loading...';
  historyOverlay.classList.add('visible');

  try {
    const res = await fetch('/api/history');
    const data = await res.json();

    if (!data.sessions.length) {
      historyList.innerHTML = '<p style="color:#666">No sessions yet. Complete a session and request a debrief to save it.</p>';
      return;
    }

    let html = `<table><thead><tr>
      <th>DATE</th><th>GRADE</th><th>TRANSMISSIONS</th><th>DEBRIEF</th><th></th>
    </tr></thead><tbody>`;

    data.sessions.forEach(s => {
      const date = new Date(s.startTime).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
      const gradeClass = s.grade ? `grade-${s.grade[0]}` : '';
      html += `<tr>
        <td>${date}</td>
        <td><span class="grade-badge ${gradeClass}">${s.grade || '—'}</span></td>
        <td>${s.transmissions}</td>
        <td>${s.hasDebrief ? 'Yes' : 'No'}</td>
        <td><button class="history-view-btn" data-file="${s.filename}">VIEW</button></td>
      </tr>`;
    });
    html += '</tbody></table>';
    historyList.innerHTML = html;

    // Click handlers for view buttons
    historyList.querySelectorAll('.history-view-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const filename = btn.dataset.file;
        sessionDetail.innerHTML = 'Loading session...';
        try {
          const r = await fetch(`/api/history/${filename}`);
          const session = await r.json();

          let detailHtml = '<h3 style="color:#00ff88;margin-bottom:12px">FULL TRANSCRIPT</h3>';
          session.messages.forEach(m => {
            if (m.content === '[DEBRIEF]') return;
            if (m.role === 'user') {
              detailHtml += `<div class="msg-pilot">YOU: ${m.content}</div>`;
            } else {
              const clean = m.content.replace(/^\[(RADIO|DEBRIEF)\]\s*/i, '');
              if (m.content.startsWith('[DEBRIEF]')) {
                detailHtml += `<div class="msg-debrief">${clean}</div>`;
              } else {
                detailHtml += `<div class="msg-atc">TWR: ${clean}</div>`;
              }
            }
          });

          sessionDetail.innerHTML = detailHtml;
          sessionDetail.scrollIntoView({ behavior: 'smooth' });
        } catch {
          sessionDetail.innerHTML = '<p style="color:#f66">Failed to load session</p>';
        }
      });
    });
  } catch {
    historyList.innerHTML = '<p style="color:#f66">Failed to load history</p>';
  }
});

document.getElementById('history-close').addEventListener('click', () => {
  historyOverlay.classList.remove('visible');
});
